<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{PAGE_TITLE}}</title>
<style>
  :root {
    --bg: #f7f8fa;
    --panel: #ffffff;
    --ink: #1f2937;
    --muted: #6b7280;
    --accent: #0369a1;
    --accent-soft: #eff6ff;
    --accent-deep: #0c4a6e;
    --border: #e5e7eb;
    --table-head: #f1f5f9;
    --inline-code-bg: #eef2f7;
    --inline-code-ink: #b91c1c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 15px;
    line-height: 1.5;
  }
  header.page {
    background: linear-gradient(135deg, #0369a1 0%, #075985 100%);
    color: #fff;
    padding: 24px 28px;
  }
  header.page .wrap { max-width: 920px; margin: 0 auto; }
  header.page h1 {
    margin: 0 0 4px 0;
    font-size: 1.5rem;
    letter-spacing: -0.01em;
  }
  header.page .meta {
    opacity: 0.85;
    font-size: 0.85rem;
  }

  main {
    max-width: 920px;
    margin: 0 auto;
    padding: 24px 28px 60px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }

  h2, h3 { color: var(--ink); }
  h2 {
    font-size: 1.05rem;
    margin: 22px 0 8px;
    padding-bottom: 4px;
    border-bottom: 2px solid var(--accent);
    color: var(--accent-deep);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 700;
  }
  h2:first-of-type { margin-top: 4px; }
  h3 {
    font-size: 0.95rem;
    margin: 14px 0 6px;
    font-weight: 700;
  }
  p { margin: 8px 0; }
  ul, ol { padding-left: 22px; margin: 8px 0; }
  li { margin: 5px 0; }

  blockquote {
    border-left: 4px solid var(--accent);
    background: var(--accent-soft);
    padding: 12px 18px;
    margin: 14px 0;
    border-radius: 0 8px 8px 0;
    color: var(--accent-deep);
  }
  blockquote > p { margin: 0; }
  blockquote strong { color: var(--accent-deep); }

  hr {
    border: none;
    border-top: 1px dashed #cbd5e1;
    margin: 18px 0;
  }

  table {
    border-collapse: collapse;
    width: 100%;
    margin: 10px 0;
    font-size: 0.86rem;
  }
  th, td {
    border: 1px solid var(--border);
    padding: 7px 10px;
    text-align: left;
    vertical-align: top;
  }
  th {
    background: var(--table-head);
    font-weight: 600;
  }

  code {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.86em;
    background: var(--inline-code-bg);
    color: var(--inline-code-ink);
    padding: 1px 5px;
    border-radius: 4px;
  }

  /* Companion-docs footer */
  main > p > em:first-child,
  main em:first-child { color: var(--muted); }

  .footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.78rem;
    margin: 30px 0 0;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  /* Print stylesheet — single-page friendly */
  @media print {
    body { background: #fff; font-size: 10.5pt; }
    main {
      max-width: none;
      padding: 12px 18px;
      border: none;
    }
    header.page {
      background: #0369a1 !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      padding: 14px 20px;
      color: white;
    }
    header.page h1 { font-size: 16pt; color:white; }
    header.page .meta { font-size: 9pt; }
    h2 {
      font-size: 11pt;
      margin: 14px 0 4px;
      page-break-after: avoid;
    }
    h2 + p, h2 + table, h2 + ul, h2 + ol, h2 + blockquote { page-break-before: avoid; }
    table, tr, blockquote { page-break-inside: avoid; }
    p, li { line-height: 1.35; }
    .footer { font-size: 8pt; }
  }
</style>
</head>
<body>

<header class="page">
  <div class="wrap">
    <h1>{{PAGE_TITLE}}</h1>
    <div class="meta">{{PAGE_SUBTITLE}}</div>
  </div>
</header>

<main>

{{ARTICLE}}

<div class="footer">
  {{FOOTER_NOTE}}
</div>

</main>

</body>
</html>
