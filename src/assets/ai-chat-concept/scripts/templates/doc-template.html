<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{PAGE_TITLE}}</title>
<style>
  :root {
    --bg: #f7f8fa;
    --panel: #ffffff;
    --ink: #1f2937;
    --muted: #6b7280;
    --accent: #0369a1;
    --user-bg: #eef6ff;
    --user-border: #93c5fd;
    --assistant-bg: #ffffff;
    --assistant-border: #e5e7eb;
    --code-bg: #0f172a;
    --code-ink: #e2e8f0;
    --inline-code-bg: #eef2f7;
    --inline-code-ink: #b91c1c;
    --table-border: #e5e7eb;
    --table-head: #f1f5f9;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 16px;
    line-height: 1.55;
  }
  header.page {
    background: linear-gradient(135deg, #0369a1 0%, #075985 100%);
    color: #fff;
    padding: 28px 24px;
  }
  header.page h1 {
    margin: 0 0 6px 0;
    font-size: 1.6rem;
    letter-spacing: -0.01em;
    color: white;
  }
  header.page .meta {
    opacity: 0.85;
    font-size: 0.9rem;
  }
  main {
    max-width: 920px;
    margin: 0 auto;
    padding: 24px 20px 80px;
  }
  main > section {
    margin: 0 0 12px 0;
  }
  main > section:first-child > h2:first-child {
    margin-top: 0;
  }
  h2 {
    font-size: 1.25rem;
    margin: 28px 0 10px;
    border-bottom: 1px solid #e5e7eb;
    padding-bottom: 6px;
  }
  h3 {
    font-size: 1.05rem;
    margin: 20px 0 8px;
  }
  h4 {
    font-size: 0.95rem;
    font-weight: 700;
    margin: 14px 0 6px;
    color: #334155;
  }
  p { margin: 10px 0; }
  ul, ol { padding-left: 22px; margin: 10px 0; }
  li { margin: 4px 0; }
  hr {
    border: none;
    border-top: 1px dashed #cbd5e1;
    margin: 22px 0;
  }
  table {
    border-collapse: collapse;
    width: 100%;
    margin: 12px 0;
    font-size: 0.92rem;
    background: #fff;
  }
  th, td {
    border: 1px solid var(--table-border);
    padding: 8px 10px;
    text-align: left;
    vertical-align: top;
  }
  th {
    background: var(--table-head);
    font-weight: 600;
  }
  code {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.88em;
    background: var(--inline-code-bg);
    color: var(--inline-code-ink);
    padding: 1px 5px;
    border-radius: 4px;
  }
  pre {
    background: var(--code-bg);
    color: var(--code-ink);
    padding: 14px 16px;
    border-radius: 8px;
    overflow-x: auto;
    font-size: 0.85rem;
    line-height: 1.45;
    margin: 12px 0;
  }
  pre code {
    background: transparent;
    color: inherit;
    padding: 0;
    font-size: inherit;
  }
  blockquote {
    border-left: 4px solid #cbd5e1;
    margin: 12px 0;
    padding: 4px 14px;
    color: #475569;
    background: #f8fafc;
  }
  /* Markdown task-list items: "- [ ] foo" / "- [x] foo" */
  .task-list-item { list-style: none; }
  .task-list-item input[type="checkbox"] {
    margin-right: 8px;
    transform: translateY(1px);
  }

  /* ---------- Layout with sidebar ---------- */
  .layout {
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    align-items: flex-start;
    gap: 28px;
    padding: 0 20px;
  }
  .layout > main {
    flex: 1 1 auto;
    min-width: 0;
    max-width: 920px;
    margin: 0;
    padding: 24px 0 80px;
  }

  /* ---------- Sidebar ---------- */
  .sidebar {
    flex: 0 0 300px;
    position: sticky;
    top: 16px;
    align-self: flex-start;
    max-height: calc(100vh - 32px);
    overflow-y: auto;
    padding: 20px 0;
  }
  .sidebar-inner {
    background: #f1f3f6;
    border: 1px solid #e2e6ec;
    border-radius: 12px;
    padding: 14px 12px;
  }
  .sidebar-title {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #6b7280;
    padding: 4px 8px 10px;
  }
  .prompt-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* ---------- Section card (sidebar) ---------- */
  .prompt-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: #ffffff;
    border: 1px solid #e2e6ec;
    border-radius: 10px;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease, transform 0.05s ease;
  }
  .prompt-card:hover {
    border-color: #93c5fd;
    background: #fafcff;
  }
  .prompt-card:active { transform: translateY(1px); }
  .prompt-card .card-num {
    flex: 0 0 28px;
    height: 28px;
    width: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 700;
    background: #eef2f7;
    color: #94a3b8;
    border: 1px solid #e2e6ec;
    transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }
  .prompt-card .card-body {
    min-width: 0;
    flex: 1 1 auto;
  }
  .prompt-card .card-title {
    font-size: 0.88rem;
    font-weight: 600;
    color: #1f2937;
    line-height: 1.3;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .prompt-card .card-sub {
    font-size: 0.75rem;
    color: #6b7280;
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .prompt-card.active {
    border-color: #0369a1;
    background: #eff6ff;
    box-shadow: 0 0 0 1px #0369a1 inset;
  }
  .prompt-card.active .card-num {
    background: #0369a1;
    color: #ffffff;
    border-color: #0369a1;
  }
  .prompt-card.active .card-title {
    color: #0c4a6e;
  }

  /* Anchor offset so clicked sections aren't flush to viewport edge */
  main > section[id^="section-"],
  main h2,
  main h3,
  main h4 {
    scroll-margin-top: 16px;
  }

  /* ---------- Bookmark toggle on headings ---------- */
  main h2,
  main h3,
  main h4 {
    position: relative;
    padding-right: 36px;
  }
  .bookmark-toggle {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 28px;
    height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    border-radius: 6px;
    color: #94a3b8;
    cursor: pointer;
    padding: 0;
    opacity: 1;
    transition: color 0.15s ease, background 0.15s ease;
  }
  .bookmark-toggle:hover { color: #0369a1; background: #eff6ff; }
  .bookmark-toggle:focus { outline: 2px solid #93c5fd; outline-offset: 1px; }
  .bookmark-toggle.is-bookmarked { color: #0369a1; }
  .bookmark-toggle svg { display: block; }

  /* ---------- Sidebar bookmarks section ---------- */
  .bookmark-section {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid #e2e6ec;
  }
  .bookmark-empty {
    font-size: 0.78rem;
    color: #6b7280;
    padding: 4px 8px 6px;
    line-height: 1.4;
  }
  .bookmark-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .bookmark-card {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: #ffffff;
    border: 1px solid #e2e6ec;
    border-radius: 8px;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    font-size: 0.83rem;
    line-height: 1.3;
    transition: border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
  }
  .bookmark-card:hover {
    border-color: #93c5fd;
    background: #fafcff;
  }
  .bookmark-card.active {
    border-color: #0369a1;
    background: #eff6ff;
    box-shadow: 0 0 0 1px #0369a1 inset;
  }
  .bookmark-card .bm-icon {
    flex: 0 0 16px;
    color: #0369a1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .bookmark-card .bm-label {
    flex: 1 1 auto;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: #1f2937;
  }
  .bookmark-card .bm-remove {
    flex: 0 0 22px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: #94a3b8;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    opacity: 0;
    transition: opacity 0.15s ease, color 0.15s ease, background 0.15s ease;
  }
  .bookmark-card:hover .bm-remove,
  .bookmark-card .bm-remove:focus { opacity: 1; }
  .bookmark-card .bm-remove:hover { color: #b91c1c; background: #fee2e2; }

  /* ---------- Reading progress bar ---------- */
  .progress-bar {
    position: fixed;
    top: 0;
    left: 0;
    height: 3px;
    width: 0%;
    background: linear-gradient(90deg, #0369a1 0%, #38bdf8 100%);
    z-index: 200;
    transition: width 0.08s linear;
    pointer-events: none;
  }

  /* ---------- Hamburger (mobile only) ---------- */
  .menu-toggle {
    display: none;
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 120;
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: #ffffff;
    border: 1px solid #e2e6ec;
    box-shadow: 0 2px 10px rgba(15, 23, 42, 0.15);
    cursor: pointer;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .menu-toggle:hover { background: #fafcff; border-color: #93c5fd; }
  .menu-toggle .bars {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .menu-toggle .bars span {
    display: block;
    width: 20px;
    height: 2px;
    background: #1f2937;
    border-radius: 1px;
  }

  /* ---------- Drawer backdrop ---------- */
  .drawer-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.45);
    z-index: 110;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .drawer-backdrop.is-open {
    display: block;
    opacity: 1;
  }

  .sidebar-close {
    display: none;
    position: absolute;
    top: 10px;
    right: 10px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid #e2e6ec;
    background: #ffffff;
    color: #475569;
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    align-items: center;
    justify-content: center;
    padding: 0;
    z-index: 1;
  }
  .sidebar-close:hover { background: #f1f5f9; color: #1f2937; }

  body.no-scroll { overflow: hidden; }

  /* ---------- Responsive: sidebar becomes off-canvas drawer ---------- */
  @media (max-width: 1024px) {
    .layout { padding: 0; }
    .layout > main {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px 20px 80px;
    }
    .menu-toggle { display: flex; }
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 320px;
      max-width: 85vw;
      max-height: none;
      z-index: 115;
      background: #f1f3f6;
      overflow-y: auto;
      padding: 16px 12px;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      box-shadow: 2px 0 16px rgba(0, 0, 0, 0.12);
    }
    .sidebar.is-open { transform: translateX(0); }
    .sidebar-inner {
      background: transparent;
      border: none;
      padding: 36px 6px 6px;
    }
    .sidebar-close { display: flex; }
  }

  .footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    margin: 40px 0 20px;
  }
</style>
</head>
<body>

<div class="progress-bar" id="progressBar" aria-hidden="true"></div>

<button class="menu-toggle" id="menuToggle" type="button" aria-label="Open section menu" aria-controls="sidebar" aria-expanded="false">
  <span class="bars"><span></span><span></span><span></span></span>
</button>

<div class="drawer-backdrop" id="drawerBackdrop" aria-hidden="true"></div>

<header class="page">
  <h1>{{PAGE_TITLE}}</h1>
  <div class="meta">{{PAGE_SUBTITLE}}</div>
</header>

<div class="layout">

  <aside class="sidebar" id="sidebar" aria-label="Section navigation">
    <button class="sidebar-close" id="sidebarClose" type="button" aria-label="Close section menu">×</button>
    <div class="sidebar-inner">
      <div class="sidebar-title">Sections</div>
      <nav class="prompt-list" id="promptList">
{{SIDEBAR_CARDS}}
      </nav>

      <section class="bookmark-section" aria-label="Bookmarks">
        <div class="sidebar-title">Bookmarks</div>
        <div class="bookmark-empty" id="bookmarkEmpty">
          Click the bookmark icon next to any heading to save it here.
        </div>
        <nav class="bookmark-list" id="bookmarkList"></nav>
      </section>
    </div>
  </aside>

<main>

{{INTRO}}

{{ARTICLE}}

<div class="footer">
  {{FOOTER_NOTE}}
</div>

</main>
</div>

<script>
  (function () {
    // ---------- DOM refs ----------
    const cards = Array.from(document.querySelectorAll('.prompt-card'));
    const targets = cards
      .map(c => document.getElementById(c.dataset.target))
      .filter(Boolean);

    const sidebar = document.getElementById('sidebar');
    const backdrop = document.getElementById('drawerBackdrop');
    const menuToggle = document.getElementById('menuToggle');
    const sidebarClose = document.getElementById('sidebarClose');
    const progressBar = document.getElementById('progressBar');
    const bookmarkList = document.getElementById('bookmarkList');
    const bookmarkEmpty = document.getElementById('bookmarkEmpty');

    const STORAGE_KEY = '{{STORAGE_KEY}}';
    const isMobile = () => window.matchMedia('(max-width: 1024px)').matches;

    // ---------- Drawer ----------
    function openDrawer() {
      sidebar.classList.add('is-open');
      backdrop.classList.add('is-open');
      document.body.classList.add('no-scroll');
      if (menuToggle) menuToggle.setAttribute('aria-expanded', 'true');
    }
    function closeDrawer() {
      sidebar.classList.remove('is-open');
      backdrop.classList.remove('is-open');
      document.body.classList.remove('no-scroll');
      if (menuToggle) menuToggle.setAttribute('aria-expanded', 'false');
    }

    if (menuToggle) menuToggle.addEventListener('click', openDrawer);
    if (sidebarClose) sidebarClose.addEventListener('click', closeDrawer);
    if (backdrop) backdrop.addEventListener('click', closeDrawer);
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && sidebar.classList.contains('is-open')) closeDrawer();
    });

    function smoothScrollTo(el) {
      if (isMobile()) {
        closeDrawer();
        setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'start' }), 260);
      } else {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    // ---------- Section cards ----------
    cards.forEach(card => {
      card.addEventListener('click', e => {
        e.preventDefault();
        const el = document.getElementById(card.dataset.target);
        if (!el) return;
        smoothScrollTo(el);
        history.replaceState(null, '', '#' + card.dataset.target);
        setActiveSection(card.dataset.target);
      });
    });

    function setActiveSection(id) {
      cards.forEach(c => c.classList.toggle('active', c.dataset.target === id));
    }

    if ('IntersectionObserver' in window && targets.length) {
      const observer = new IntersectionObserver(
        entries => {
          const visible = entries
            .filter(e => e.isIntersecting)
            .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
          if (visible.length) setActiveSection(visible[0].target.id);
        },
        { rootMargin: '-15% 0px -70% 0px', threshold: 0 }
      );
      targets.forEach(t => observer.observe(t));
    }

    if (location.hash) {
      const hashId = location.hash.replace('#', '');
      if (cards.some(c => c.dataset.target === hashId)) setActiveSection(hashId);
    } else if (cards.length) {
      setActiveSection(cards[0].dataset.target);
    }

    // ---------- Heading IDs + bookmark toggles ----------
    function slugify(text) {
      return (text || '')
        .toLowerCase()
        .normalize('NFKD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9\s-]/g, '')
        .trim()
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-');
    }

    function bookmarkIconSVG(filled) {
      return '<svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="' +
        (filled ? 'currentColor' : 'none') +
        '" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
        '<path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>';
    }

    const usedIds = new Set();
    document.querySelectorAll('[id]').forEach(el => usedIds.add(el.id));

    const headings = Array.from(document.querySelectorAll('main h2, main h3, main h4'));
    headings.forEach(h => {
      if (!h.id) {
        let base = 'h-' + slugify(h.textContent || '');
        if (base === 'h-') base = 'h-section';
        let id = base;
        let n = 2;
        while (usedIds.has(id)) {
          id = base + '-' + n;
          n++;
        }
        h.id = id;
        usedIds.add(id);
      }
      addBookmarkToggle(h);
    });

    function addBookmarkToggle(h) {
      if (h.querySelector('.bookmark-toggle')) return;
      const labelText = (h.textContent || '').replace(/\s+/g, ' ').trim();
      const btn = document.createElement('button');
      btn.className = 'bookmark-toggle';
      btn.type = 'button';
      btn.setAttribute('aria-label', 'Toggle bookmark for ' + labelText);
      btn.dataset.targetId = h.id;
      btn.dataset.label = labelText;
      btn.innerHTML = bookmarkIconSVG(false);
      btn.addEventListener('click', e => {
        e.preventDefault();
        e.stopPropagation();
        toggleBookmark(h.id, labelText);
      });
      h.appendChild(btn);
    }

    // ---------- Bookmarks store ----------
    function loadBookmarks() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) { return []; }
    }
    function saveBookmarks(arr) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }
      catch (e) { /* silent */ }
    }

    let bookmarks = loadBookmarks();

    function isBookmarked(id) {
      return bookmarks.some(b => b.targetId === id);
    }

    function toggleBookmark(id, label) {
      if (isBookmarked(id)) {
        bookmarks = bookmarks.filter(b => b.targetId !== id);
      } else {
        bookmarks.push({
          targetId: id,
          label: label,
          addedAt: new Date().toISOString()
        });
      }
      saveBookmarks(bookmarks);
      renderBookmarks();
    }

    // ---------- Bookmark rendering ----------
    let bookmarkObserver = null;

    function renderBookmarks() {
      document.querySelectorAll('.bookmark-toggle').forEach(btn => {
        const isOn = isBookmarked(btn.dataset.targetId);
        btn.classList.toggle('is-bookmarked', isOn);
        btn.innerHTML = bookmarkIconSVG(isOn);
      });

      if (!bookmarkList) return;
      bookmarkList.innerHTML = '';

      if (bookmarks.length === 0) {
        if (bookmarkEmpty) bookmarkEmpty.style.display = 'block';
      } else {
        if (bookmarkEmpty) bookmarkEmpty.style.display = 'none';
        bookmarks.forEach(b => {
          const card = document.createElement('a');
          card.className = 'bookmark-card';
          card.href = '#' + b.targetId;
          card.dataset.target = b.targetId;
          card.title = b.label;
          card.innerHTML =
            '<span class="bm-icon">' + bookmarkIconSVG(true) + '</span>' +
            '<span class="bm-label"></span>' +
            '<button class="bm-remove" type="button" aria-label="Remove bookmark">×</button>';
          card.querySelector('.bm-label').textContent = b.label;
          card.addEventListener('click', e => {
            if (e.target.closest('.bm-remove')) {
              e.preventDefault();
              e.stopPropagation();
              toggleBookmark(b.targetId, b.label);
              return;
            }
            e.preventDefault();
            const el = document.getElementById(b.targetId);
            if (!el) return;
            smoothScrollTo(el);
            history.replaceState(null, '', '#' + b.targetId);
          });
          bookmarkList.appendChild(card);
        });
      }
      refreshBookmarkObserver();
    }

    function refreshBookmarkObserver() {
      if (bookmarkObserver) {
        bookmarkObserver.disconnect();
        bookmarkObserver = null;
      }
      if (!('IntersectionObserver' in window) || bookmarks.length === 0) return;
      bookmarkObserver = new IntersectionObserver(
        entries => {
          const visible = entries
            .filter(e => e.isIntersecting)
            .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
          if (visible.length) {
            const id = visible[0].target.id;
            document.querySelectorAll('.bookmark-card').forEach(c => {
              c.classList.toggle('active', c.dataset.target === id);
            });
          }
        },
        { rootMargin: '-15% 0px -70% 0px', threshold: 0 }
      );
      bookmarks.forEach(b => {
        const el = document.getElementById(b.targetId);
        if (el) bookmarkObserver.observe(el);
      });
    }

    renderBookmarks();

    // ---------- Reading progress bar ----------
    let ticking = false;
    function updateProgress() {
      const doc = document.documentElement;
      const scrollTop = window.scrollY || doc.scrollTop;
      const scrollHeight = doc.scrollHeight - doc.clientHeight;
      const pct = scrollHeight > 0 ? Math.min(100, Math.max(0, (scrollTop / scrollHeight) * 100)) : 0;
      if (progressBar) progressBar.style.width = pct + '%';
      ticking = false;
    }
    function onScroll() {
      if (!ticking) {
        window.requestAnimationFrame(updateProgress);
        ticking = true;
      }
    }
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll);
    updateProgress();
  })();
</script>

</body>
